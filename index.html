<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Crime Centre</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Starfield canvas -->
    <canvas id="starfield"></canvas>

    <div class="split-layout">

        <div class="form-wrapper">
            <!-- Login Form -->
            <div class="login-container" id="login-form">
                <img src="logo final.jpeg" alt="Cyber Crime Centre Logo" class="form-logo">
                <h2>Cyber Crime Centre</h2>
                <p>Login to your account</p>
                <form id="login-form-el">
                    <div class="input-box">
                        <label>Email</label>
                        <input type="email" id="login-email" placeholder="Enter your email" required>
                        <span class="error-msg" id="login-email-error"></span>
                    </div>

                    <div class="input-box">
                        <label>Password</label>
                        <input type="password" id="login-password" placeholder="Enter your password" required>
                        <span class="error-msg" id="login-password-error"></span>
                    </div>

                    <button type="submit">Login</button>

                    <p class="register">
                        Don't have an account? <a href="#" id="show-register">Register</a>
                    </p>
                </form>
            </div>

            <!-- Registration Form -->
            <div class="login-container" id="register-form">
                <img src="logo final.jpeg" alt="Cyber Crime Centre Logo" class="form-logo">
                <h2>Cyber Crime Centre</h2>
                <p>Create your account</p>
                <form id="register-form-el">
                    <div class="input-box">
                        <label>Full Name</label>
                        <input type="text" id="reg-name" placeholder="Enter your full name" required>
                        <span class="error-msg" id="name-error"></span>
                    </div>

                    <div class="input-box">
                        <label>Email</label>
                        <input type="email" id="reg-email" placeholder="Enter your email" required>
                        <span class="error-msg" id="email-error"></span>
                    </div>

                    <div class="input-box">
                        <label>Phone Number</label>
                        <div class="phone-wrapper">
                            <select id="country-code" class="country-select">
                                <option value="+91">🇮🇳 +91</option>
                                <option value="+1">🇺🇸 +1</option>
                                <option value="+44">🇬🇧 +44</option>
                                <option value="+61">🇦🇺 +61</option>
                                <option value="+81">🇯🇵 +81</option>
                                <option value="+86">🇨🇳 +86</option>
                                <option value="+49">🇩🇪 +49</option>
                                <option value="+33">🇫🇷 +33</option>
                                <option value="+971">🇦🇪 +971</option>
                                <option value="+966">🇸🇦 +966</option>
                                <option value="+65">🇸🇬 +65</option>
                                <option value="+82">🇰🇷 +82</option>
                                <option value="+55">🇧🇷 +55</option>
                                <option value="+7">🇷🇺 +7</option>
                                <option value="+27">🇿🇦 +27</option>
                                <option value="+234">🇳🇬 +234</option>
                                <option value="+92">🇵🇰 +92</option>
                                <option value="+880">🇧🇩 +880</option>
                                <option value="+94">🇱🇰 +94</option>
                                <option value="+977">🇳🇵 +977</option>
                            </select>
                            <input type="tel" id="reg-phone" placeholder="Enter 10 digit number" required>
                        </div>
                        <span class="error-msg" id="phone-error"></span>
                    </div>

                    <div class="input-box">
                        <label>Password</label>
                        <input type="password" id="reg-password" placeholder="Create a password" required>
                        <span class="error-msg" id="password-error"></span>
                        <ul class="password-requirements">
                            <li id="req-length">At least 8 characters</li>
                            <li id="req-upper">One uppercase letter (A-Z)</li>
                            <li id="req-lower">One lowercase letter (a-z)</li>
                            <li id="req-number">One number (0-9)</li>
                            <li id="req-symbol">One symbol (!@#$%..)</li>
                        </ul>
                    </div>

                    <div class="input-box">
                        <label>Confirm Password</label>
                        <input type="password" id="reg-confirm" placeholder="Confirm your password" required>
                        <span class="error-msg" id="confirm-error"></span>
                    </div>

                    <button type="submit">Register</button>

                    <p class="register">
                        Already have an account? <a href="#" id="show-login">Login</a>
                    </p>
                </form>
            </div>
        </div>

        <!-- Image Slideshow -->
        <div class="slideshow-outer">
            <div class="slideshow-wrapper">
                <img src="cc1.jpg" class="slide active" alt="Slide 1">
                <img src="cc2.png" class="slide" alt="Slide 2">
                <img src="logo final.jpeg" class="slide" alt="Slide 3">
            </div>
            <div class="slide-dots">
                <span class="dot active"></span>
                <span class="dot"></span>
                <span class="dot"></span>
            </div>
        </div>

    </div>

    <script>
        // --- Image Slideshow (every 2 seconds) ---
        const slides = document.querySelectorAll('.slide');
        const dots = document.querySelectorAll('.slide-dots .dot');
        let currentSlide = 0;

        setInterval(() => {
            slides[currentSlide].classList.remove('active');
            dots[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].classList.add('active');
            dots[currentSlide].classList.add('active');
        }, 2000);

        // --- Page transition logic ---
        const loginForm = document.getElementById('login-form');
        const registerForm = document.getElementById('register-form');
        const showRegister = document.getElementById('show-register');
        const showLogin = document.getElementById('show-login');

        function switchToRegister() {
            loginForm.classList.add('slide-out-left');
            loginForm.classList.remove('slide-in-left');
            registerForm.classList.add('slide-in-right');
            registerForm.classList.remove('slide-out-right', 'hidden');
            registerForm.style.pointerEvents = 'all';

            setTimeout(() => {
                loginForm.classList.add('hidden');
                loginForm.style.pointerEvents = 'none';
            }, 500);
        }

        function switchToLogin() {
            registerForm.classList.add('slide-out-right');
            registerForm.classList.remove('slide-in-right');
            loginForm.classList.add('slide-in-left');
            loginForm.classList.remove('slide-out-left', 'hidden');
            loginForm.style.pointerEvents = 'all';

            setTimeout(() => {
                registerForm.classList.add('hidden');
                registerForm.style.pointerEvents = 'none';
            }, 500);
        }

        showRegister.addEventListener('click', (e) => {
            e.preventDefault();
            clearErrors();
            switchToRegister();
        });

        showLogin.addEventListener('click', (e) => {
            e.preventDefault();
            clearErrors();
            switchToLogin();
        });

        // --- Login form validation ---
        document.getElementById('login-form-el').addEventListener('submit', (e) => {
            e.preventDefault();
            clearErrors();
            let valid = true;

            const email = document.getElementById('login-email').value.trim();
            if (email === '') {
                showError('login-email-error', 'Email is required');
                valid = false;
            } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                showError('login-email-error', 'Enter a valid email address');
                valid = false;
            }

            const password = document.getElementById('login-password').value;
            if (password.length < 8) {
                showError('login-password-error', 'Must be at least 8 characters');
                valid = false;
            } else if (!/[A-Z]/.test(password)) {
                showError('login-password-error', 'Must contain an uppercase letter');
                valid = false;
            } else if (!/[a-z]/.test(password)) {
                showError('login-password-error', 'Must contain a lowercase letter');
                valid = false;
            } else if (!/[0-9]/.test(password)) {
                showError('login-password-error', 'Must contain a number');
                valid = false;
            } else if (!/[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(password)) {
                showError('login-password-error', 'Must contain a symbol (!@#$%.. etc)');
                valid = false;
            }

            if (!valid) return;

            localStorage.setItem('userEmail', email);
            window.location.href = 'home.html';
        });

        // --- Live password requirement checker ---
        const regPassword = document.getElementById('reg-password');
        regPassword.addEventListener('input', () => {
            const val = regPassword.value;
            document.getElementById('req-length').classList.toggle('met', val.length >= 8);
            document.getElementById('req-upper').classList.toggle('met', /[A-Z]/.test(val));
            document.getElementById('req-lower').classList.toggle('met', /[a-z]/.test(val));
            document.getElementById('req-number').classList.toggle('met', /[0-9]/.test(val));
            document.getElementById('req-symbol').classList.toggle('met', /[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(val));
        });

        // --- Validation helpers ---
        function clearErrors() {
            document.querySelectorAll('.error-msg').forEach(el => el.textContent = '');
        }

        function showError(id, msg) {
            document.getElementById(id).textContent = msg;
        }

        // --- Phone Validation logic ---
        const phoneLengths = {
            '+1': [10], '+44': [10, 11], '+61': [9], '+81': [10, 11],
            '+86': [11], '+49': [10, 11], '+33': [9], '+971': [9],
            '+966': [9], '+65': [8], '+82': [9, 10], '+55': [10, 11],
            '+7': [10], '+27': [9], '+234': [10, 11], '+92': [10],
            '+880': [10], '+94': [9], '+977': [10], '+91': [10]
        };

        const countrySelect = document.getElementById('country-code');
        const phoneInput = document.getElementById('reg-phone');

        countrySelect.addEventListener('change', () => {
            const lengths = phoneLengths[countrySelect.value] || [10];
            phoneInput.placeholder = `Enter ${lengths.join(' or ')} digit number`;
            phoneInput.maxLength = Math.max(...lengths);
        });

        // Registration form submit → validate → slide back to login
        document.getElementById('register-form-el').addEventListener('submit', (e) => {
            e.preventDefault();
            clearErrors();
            let valid = true;

            // Full Name: not empty
            const name = document.getElementById('reg-name').value.trim();
            if (name === '') {
                showError('name-error', 'Full name is required');
                valid = false;
            }

            // Email: not empty and valid format
            const email = document.getElementById('reg-email').value.trim();
            if (email === '') {
                showError('email-error', 'Email is required');
                valid = false;
            } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                showError('email-error', 'Enter a valid email address');
                valid = false;
            }

            // Phone validation based on country
            const phone = document.getElementById('reg-phone').value;
            const countryCode = document.getElementById('country-code').value;
            const allowedLengths = phoneLengths[countryCode] || [10];

            if (!/^[0-9]+$/.test(phone)) {
                showError('phone-error', 'Phone number must contain only digits');
                valid = false;
            } else if (!allowedLengths.includes(phone.length)) {
                showError('phone-error', `Valid length is ${allowedLengths.join(' or ')} digits`);
                valid = false;
            }

            // Password: uppercase, lowercase, digit, symbol, 8+ chars
            const password = document.getElementById('reg-password').value;
            if (password.length < 8) {
                showError('password-error', 'Must be at least 8 characters');
                valid = false;
            } else if (!/[A-Z]/.test(password)) {
                showError('password-error', 'Must contain an uppercase letter');
                valid = false;
            } else if (!/[a-z]/.test(password)) {
                showError('password-error', 'Must contain a lowercase letter');
                valid = false;
            } else if (!/[0-9]/.test(password)) {
                showError('password-error', 'Must contain a number');
                valid = false;
            } else if (!/[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(password)) {
                showError('password-error', 'Must contain a symbol (!@#$%.. etc)');
                valid = false;
            }

            // Confirm password match
            const confirm = document.getElementById('reg-confirm').value;
            if (password !== confirm) {
                showError('confirm-error', 'Passwords do not match');
                valid = false;
            }

            if (!valid) return;

            localStorage.setItem('userFullName', name);
            localStorage.setItem('userEmail', email);
            localStorage.setItem('userPhone', countryCode + ' ' + phone);

            alert('Registration successful! Please login.');
            e.target.reset();
            switchToLogin();
        });

        // --- Starfield ---
        const canvas = document.getElementById('starfield');
        const ctx = canvas.getContext('2d');

        let w, h, cx, cy;
        const STAR_COUNT = 600;
        const SPEED = 2;
        let stars = [];

        function resize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            cx = w / 2;
            cy = h / 2;
        }
        resize();
        window.addEventListener('resize', resize);

        class Star {
            constructor() { this.reset(); }
            reset() {
                this.x = (Math.random() - 0.5) * w;
                this.y = (Math.random() - 0.5) * h;
                this.z = Math.random() * w;
                this.pz = this.z;
            }
            update() {
                this.pz = this.z;
                this.z -= SPEED * 2;
                if (this.z < 1) { this.reset(); this.z = w; this.pz = this.z; }
            }
            draw() {
                const sx = (this.x / this.z) * w + cx;
                const sy = (this.y / this.z) * h + cy;
                const px = (this.x / this.pz) * w + cx;
                const py = (this.y / this.pz) * h + cy;
                const depth = 1 - this.z / w;
                const size = Math.max(0.5, depth * 3);
                const alpha = Math.max(0.1, depth);
                ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(sx, sy);
                ctx.strokeStyle = `rgba(255,255,255,${alpha * 0.6})`;
                ctx.lineWidth = size * 0.5; ctx.stroke();
                ctx.beginPath(); ctx.arc(sx, sy, size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255,255,255,${alpha})`; ctx.fill();
            }
        }

        for (let i = 0; i < STAR_COUNT; i++) {
            const star = new Star(); star.z = Math.random() * w; stars.push(star);
        }

        function animate() {
            ctx.fillStyle = 'rgba(5, 5, 15, 0.25)';
            ctx.fillRect(0, 0, w, h);
            stars.forEach(s => { s.update(); s.draw(); });
            requestAnimationFrame(animate);
        }
        ctx.fillStyle = '#05050f'; ctx.fillRect(0, 0, w, h);
        animate();
    </script>

</body>

</html>
